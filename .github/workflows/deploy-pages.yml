name: deploy-pages

# Publishes the public DEMO build (browser MSW serves synthetic /api data — no backend, no
# server keys) to GitHub Pages. One-time setup by the repo owner:
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → add secret VITE_MAPBOX_ACCESS_TOKEN
#      (a PUBLIC pk. Mapbox token; restrict it to the Pages origin).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Build demo site
        run: npm run build -w frontend
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
          VITE_DEMO: '1'
          BASE_PATH: /pathfinder-app/
      - name: SPA 404 fallback
        run: cp frontend/dist/index.html frontend/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
